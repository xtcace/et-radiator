<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — E.T. Radiator Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050812;--bg2:#080C1C;--s1:#0D1225;--s2:#131830;--s3:#1A213C;--s4:#212848;
  --blue:#4A8CFF;--blue-dim:#2E6CD6;
  --muted:#3E4D6E;--dim:#6478A0;--soft:#8D9FBE;--light:#C8D4ED;--white:#E8EEFA;
  --line:rgba(255,255,255,0.05);--line2:rgba(255,255,255,0.09);
  --green:#4DC77A;--amber:#F5A623;--red:#F0706A;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--light);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* TOPBAR */
#topbar{
  background:rgba(5,8,18,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  height:62px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,3%,48px);
  position:sticky;top:0;z-index:100;
}
.t-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.t-logo-mark{width:32px;height:32px}
.t-logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--white)}
.t-logo-name b{color:var(--blue)}
.t-sub{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-left:4px}
.t-right{display:flex;align-items:center;gap:12px}
.t-user{font-size:12px;color:var(--dim)}
.t-btn{padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--dim);transition:all .2s}
.t-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(74,140,255,.06)}
.view-site{background:var(--blue);border-color:var(--blue);color:#fff}
.view-site:hover{background:var(--blue-dim);border-color:var(--blue-dim);color:#fff}

/* LAYOUT */
.page{padding:32px clamp(16px,3%,48px)}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat{background:var(--s1);border:1px solid var(--line2);padding:22px 24px}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;line-height:1}
.stat-val.blue{color:var(--blue)}
.stat-val.amber{color:var(--amber)}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid var(--line2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;
}
.filter-btn:hover{background:var(--s1);color:var(--soft)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.search-wrap{position:relative}
.search-wrap input{
  padding:8px 16px 8px 36px;background:var(--s1);border:1px solid var(--line2);
  color:var(--light);font-family:'DM Sans',sans-serif;font-size:13px;
  outline:none;width:220px;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.5}
.refresh-btn{padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--line2);overflow-x:auto}
.tbl-empty{padding:60px;text-align:center;color:var(--muted);font-size:14px}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{border-bottom:1px solid var(--line2)}
thead th{padding:14px 18px;text-align:left;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--line);transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
tbody td{padding:16px 18px;font-size:13px;vertical-align:middle}
.td-name{font-weight:600;color:var(--white)}
.td-sub{font-size:11px;color:var(--muted);margin-top:2px}
.td-service{color:var(--soft)}
.td-date{color:var(--soft);white-space:nowrap}
.td-phone a{color:var(--blue);text-decoration:none}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-pending{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.b-confirmed{background:rgba(74,140,255,.1);color:var(--blue);border:1px solid rgba(74,140,255,.2)}
.b-completed{background:rgba(77,199,122,.1);color:var(--green);border:1px solid rgba(77,199,122,.2)}
.b-cancelled{background:rgba(240,112,106,.1);color:var(--red);border:1px solid rgba(240,112,106,.2)}

/* ACTION BUTTONS */
.act-btns{display:flex;gap:6px}
.act{padding:5px 10px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap}
.act:hover{background:var(--s3)}
.act.confirm{border-color:rgba(74,140,255,.3);color:var(--blue)}
.act.confirm:hover{background:rgba(74,140,255,.1)}
.act.complete{border-color:rgba(77,199,122,.3);color:var(--green)}
.act.complete:hover{background:rgba(77,199,122,.1)}
.act.cancel{border-color:rgba(240,112,106,.3);color:var(--red)}
.act.cancel:hover{background:rgba(240,112,106,.1)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--line2);padding:36px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;line-height:1;padding:4px 8px;transition:color .2s}
.modal-close:hover{color:var(--white)}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--white);margin-bottom:24px}
.modal-row{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap}
.modal-field{flex:1;min-width:140px}
.modal-field label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.modal-field p{font-size:14px;color:var(--light)}
.modal-div{height:1px;background:var(--line);margin:20px 0}
.modal-notes{display:flex;flex-direction:column;gap:8px}
.modal-notes label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.modal-notes textarea{
  background:var(--s2);border:1px solid var(--line2);
  color:var(--light);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:12px;outline:none;height:80px;resize:vertical;width:100%;
  transition:border-color .2s;
}
.modal-notes textarea:focus{border-color:var(--blue)}
.modal-acts{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.m-act{flex:1;padding:12px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--line2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;min-width:100px}
.m-act.m-confirm{background:var(--blue);border-color:var(--blue);color:#fff}
.m-act.m-confirm:hover{background:var(--blue-dim)}
.m-act.m-complete{border-color:rgba(77,199,122,.4);color:var(--green)}
.m-act.m-complete:hover{background:rgba(77,199,122,.1)}
.m-act.m-cancel{border-color:rgba(240,112,106,.4);color:var(--red)}
.m-act.m-cancel:hover{background:rgba(240,112,106,.1)}

/* LOADING */
.loading{padding:60px;text-align:center;color:var(--muted)}
.loader{width:28px;height:28px;border:2px solid var(--line2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="../index.html" class="t-logo">
      <svg class="t-logo-mark" viewBox="0 0 38 38" fill="none">
        <path d="M19 1L35.5 10V28L19 37L2.5 28V10L19 1Z" fill="#4A8CFF"/>
        <rect x="9.5" y="13" width="19" height="12" rx=".8" fill="none" stroke="#fff" stroke-width="1.1"/>
        <line x1="13.5" y1="13" x2="13.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="17.5" y1="13" x2="17.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="21.5" y1="13" x2="21.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="25.5" y1="13" x2="25.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="9.5" y1="16.5" x2="6.5" y2="16.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="9.5" y1="21.5" x2="6.5" y2="21.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="28.5" y1="16.5" x2="31.5" y2="16.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="28.5" y1="21.5" x2="31.5" y2="21.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span class="t-logo-name">E.T. <b>Radiator</b></span>
    </a>
    <span class="t-sub">/ Admin</span>
  </div>
  <div class="t-right">
    <span class="t-user" id="user-email">Loading…</span>
    <a href="../index.html" target="_blank"><button class="t-btn view-site">View Site</button></a>
    <button class="t-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Total Bookings</div>
      <div class="stat-val blue" id="s-total">—</div>
      <div class="stat-sub">All time</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Pending</div>
      <div class="stat-val amber" id="s-pending">—</div>
      <div class="stat-sub">Awaiting confirmation</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Confirmed</div>
      <div class="stat-val blue" id="s-confirmed">—</div>
      <div class="stat-sub">Upcoming jobs</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Completed</div>
      <div class="stat-val green" id="s-completed">—</div>
      <div class="stat-sub">Jobs done</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('confirmed',this)">Confirmed</button>
      <button class="filter-btn" onclick="setFilter('completed',this)">Completed</button>
      <button class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="text" id="search" placeholder="Search name, vehicle, service…" oninput="renderTable()">
      </div>
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="tbl-wrap" id="tbl-wrap">
    <div class="loading"><div class="loader"></div>Loading bookings…</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h2 id="m-title">Booking Details</h2>
    <div id="m-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://ivoolvyccxroegbkqkbu.supabase.co';
const SUPABASE_ANON = 'sb_publishable_JKiBy85UMsy1-d6enEKviw_tI6UknW9';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allBookings = [];
let currentFilter = 'all';

// Auth guard
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }
  document.getElementById('user-email').textContent = data.session.user.email;
  await loadBookings();
})();

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

async function loadBookings() {
  document.getElementById('tbl-wrap').innerHTML = '<div class="loading"><div class="loader"></div>Loading bookings…</div>';
  const { data, error } = await sb.from('bookings').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('tbl-wrap').innerHTML = '<div class="tbl-empty">Failed to load bookings. Check your Supabase connection.</div>'; return; }
  allBookings = data || [];
  updateStats();
  renderTable();
}

function updateStats() {
  document.getElementById('s-total').textContent     = allBookings.length;
  document.getElementById('s-pending').textContent   = allBookings.filter(b => b.status === 'pending').length;
  document.getElementById('s-confirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
  document.getElementById('s-completed').textContent = allBookings.filter(b => b.status === 'completed').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = allBookings.filter(b => {
    if (currentFilter !== 'all' && b.status !== currentFilter) return false;
    if (!q) return true;
    const s = `${b.first_name} ${b.last_name} ${b.vehicle_make} ${b.vehicle_model} ${b.service} ${b.phone}`.toLowerCase();
    return s.includes(q);
  });

  if (!rows.length) {
    document.getElementById('tbl-wrap').innerHTML = '<div class="tbl-empty">No bookings found.</div>';
    return;
  }

  const html = `<table>
    <thead><tr>
      <th>Customer</th><th>Vehicle</th><th>Service</th>
      <th>Preferred Date</th><th>Phone</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${rows.map(b => `
      <tr onclick="openModal('${b.id}')">
        <td><div class="td-name">${b.first_name} ${b.last_name}</div><div class="td-sub">${b.email || '—'}</div></td>
        <td><div class="td-service">${b.vehicle_make || '—'} ${b.vehicle_model || ''}</div><div class="td-sub">${b.vehicle_year || ''} ${b.vehicle_rego ? '· ' + b.vehicle_rego : ''}</div></td>
        <td><div class="td-service" style="max-width:200px">${b.service}</div></td>
        <td class="td-date">${fmtDate(b.preferred_date)} ${b.preferred_time ? '<br><span style="font-size:11px;color:var(--muted)">' + b.preferred_time + '</span>' : ''}</td>
        <td><a href="tel:${b.phone}" onclick="event.stopPropagation()" class="td-phone"><a href="tel:${b.phone}">${b.phone}</a></td>
        <td><span class="badge b-${b.status}">${b.status}</span></td>
        <td onclick="event.stopPropagation()">
          <div class="act-btns">
            ${b.status === 'pending'   ? `<button class="act confirm"  onclick="updateStatus('${b.id}','confirmed')">Confirm</button>` : ''}
            ${b.status === 'confirmed' ? `<button class="act complete" onclick="updateStatus('${b.id}','completed')">Complete</button>` : ''}
            ${b.status !== 'cancelled' && b.status !== 'completed' ? `<button class="act cancel" onclick="updateStatus('${b.id}','cancelled')">Cancel</button>` : ''}
          </div>
        </td>
      </tr>
    `).join('')}
    </tbody>
  </table>`;
  document.getElementById('tbl-wrap').innerHTML = html;
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

async function updateStatus(id, status) {
  const { error } = await sb.from('bookings').update({ status }).eq('id', id);
  if (!error) { await loadBookings(); closeModalDirect(); }
}

function openModal(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;
  document.getElementById('m-title').textContent = `${b.first_name} ${b.last_name}`;
  document.getElementById('m-body').innerHTML = `
    <span class="badge b-${b.status}" style="margin-bottom:20px;display:inline-flex">${b.status}</span>
    <div class="modal-row">
      <div class="modal-field"><label>Phone</label><p><a href="tel:${b.phone}" style="color:var(--blue);text-decoration:none">${b.phone}</a></p></div>
      <div class="modal-field"><label>Email</label><p>${b.email || '—'}</p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Vehicle</label><p>${b.vehicle_make || '—'} ${b.vehicle_model || ''} ${b.vehicle_year || ''}</p></div>
      <div class="modal-field"><label>Registration</label><p>${b.vehicle_rego || '—'}</p></div>
    </div>
    <div class="modal-div"></div>
    <div class="modal-row">
      <div class="modal-field"><label>Service</label><p>${b.service}</p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Preferred Date</label><p>${fmtDate(b.preferred_date)}</p></div>
      <div class="modal-field"><label>Preferred Time</label><p>${b.preferred_time || 'No preference'}</p></div>
    </div>
    ${b.message ? `<div class="modal-div"></div><div class="modal-field"><label>Customer Notes</label><p style="color:var(--soft);line-height:1.6">${b.message}</p></div>` : ''}
    <div class="modal-div"></div>
    <div class="modal-notes">
      <label>Internal Notes</label>
      <textarea id="notes-ta" placeholder="Add notes about this booking…">${b.notes || ''}</textarea>
    </div>
    <div class="modal-acts">
      <button class="m-act" onclick="saveNotes('${b.id}')">Save Notes</button>
      ${b.status === 'pending'   ? `<button class="m-act m-confirm" onclick="updateStatus('${b.id}','confirmed')">✓ Confirm Booking</button>` : ''}
      ${b.status === 'confirmed' ? `<button class="m-act m-complete" onclick="updateStatus('${b.id}','completed')">✓ Mark Complete</button>` : ''}
      ${b.status !== 'cancelled' && b.status !== 'completed' ? `<button class="m-act m-cancel" onclick="updateStatus('${b.id}','cancelled')">✕ Cancel</button>` : ''}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:14px">Booking submitted: ${new Date(b.created_at).toLocaleString('en-AU')}</p>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

async function saveNotes(id) {
  const notes = document.getElementById('notes-ta').value;
  await sb.from('bookings').update({ notes }).eq('id', id);
  await loadBookings();
}

function closeModal(e) { if (e.target === document.getElementById('modal-bg')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-bg').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
</script>
</body>
</html>
