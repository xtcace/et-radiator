<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — E.T. Radiator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050812;--s1:#0D1225;--s2:#131830;--s3:#1A213C;
  --blue:#4A8CFF;--blue-dim:#2E6CD6;
  --muted:#3E4D6E;--dim:#6478A0;--soft:#8D9FBE;--light:#C8D4ED;--white:#E8EEFA;
  --line:rgba(255,255,255,0.05);--line2:rgba(255,255,255,0.09);
}
body{background:var(--bg);color:var(--light);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;background-repeat:repeat}

.bg-glow{position:fixed;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(74,140,255,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}

.login-wrap{width:100%;max-width:420px}

.login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:44px;text-decoration:none}
.logo-mark{width:44px;height:44px}
.logo-name{text-align:left}
.logo-top{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--white)}
.logo-top b{color:var(--blue)}
.logo-bot{font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block}

.card{background:var(--s1);border:1px solid var(--line2);padding:40px}

.card-top{margin-bottom:32px}
.card-top h1{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--white);margin-bottom:6px}
.card-top p{font-size:14px;color:var(--dim);font-weight:300}

.ff{margin-bottom:18px}
.ff label{display:block;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.ff input{
  width:100%;padding:13px 16px;
  background:var(--s2);border:1px solid var(--line2);
  color:var(--light);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,background .2s;
}
.ff input:focus{border-color:var(--blue);background:var(--s3)}

.btn{
  width:100%;background:var(--blue);color:#fff;border:none;
  padding:14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:background .2s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn:hover{background:var(--blue-dim)}
.btn:disabled{background:var(--muted);cursor:not-allowed}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.err{font-size:12px;color:#F0706A;margin-top:12px;display:none;text-align:center}

.footer-note{text-align:center;margin-top:24px;font-size:12px;color:var(--muted)}
.footer-note a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page">
  <div class="login-wrap">
    <a href="../index.html" class="login-logo">
      <svg class="logo-mark" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 1L35.5 10V28L19 37L2.5 28V10L19 1Z" fill="#4A8CFF"/>
        <rect x="9.5" y="13" width="19" height="12" rx=".8" fill="none" stroke="#fff" stroke-width="1.1"/>
        <line x1="13.5" y1="13" x2="13.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="17.5" y1="13" x2="17.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="21.5" y1="13" x2="21.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="25.5" y1="13" x2="25.5" y2="25" stroke="#fff" stroke-width="1.1" stroke-opacity=".55"/>
        <line x1="9.5" y1="16.5" x2="6.5" y2="16.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="9.5" y1="21.5" x2="6.5" y2="21.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="28.5" y1="16.5" x2="31.5" y2="16.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="28.5" y1="21.5" x2="31.5" y2="21.5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <div class="logo-name">
        <span class="logo-top">E.T. <b>Radiator</b></span>
        <span class="logo-bot">Admin Portal</span>
      </div>
    </a>

    <div class="card">
      <div class="card-top">
        <h1>Sign In</h1>
        <p>Admin access only — for workshop staff</p>
      </div>
      <div class="ff"><label>Email</label><input type="email" id="email" placeholder="admin@etradiator.com.au" autocomplete="username"></div>
      <div class="ff"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn" id="login-btn" onclick="login()">
        <span>Sign In</span>
        <div class="spinner" id="spin"></div>
      </button>
      <p class="err" id="err"></p>
    </div>

    <div class="footer-note"><a href="../index.html">← Back to website</a></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn  = document.getElementById('login-btn');
  const spin = document.getElementById('spin');
  const err  = document.getElementById('err');

  err.style.display = 'none';
  if (!email || !password) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }

  btn.disabled = true; spin.style.display = 'block';

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    err.textContent = 'Incorrect email or password.';
    err.style.display = 'block';
    btn.disabled = false; spin.style.display = 'none';
  } else {
    window.location.href = 'dashboard.html';
  }
}
</script>
</body>
</html>
